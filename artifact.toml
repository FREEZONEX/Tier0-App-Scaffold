# MonoApp — UNSSWE 部署配置
#
# 本文件由 Build-Deploy 服务解析，决定如何构建、运行、健康检查。
# 优先级：App deploy_config (DB 覆写) > 本文件 > 平台硬编码默认值。
#
# 环境变量注入（自动）:
#   DATABASE_URL  — Backend 按 Project schema 自动注入到 build_env / run_env
#   PORT          — RuntimeManager 按 localPort 自动注入

[deployment]
deploymentTarget = "autoscale"

[deployment.postBuild]
args = ["npm", "prune", "--omit=dev"]

[[services]]
name = "web"
paths = ["/"]
localPort = 5173

[services.production]
serve = "dynamic"

[services.production.build]
args = [
  "npm", "install", "&&",
  "npm", "run", "build",
]
outputDir = "."

[services.production.run]
args = ["node", "server.mjs"]
image = "node:22-alpine"

[services.production.run.env]
NODE_ENV = "production"
HOST = "0.0.0.0"
SESSION_SECRET = "fff03854d9eee4fca8fb13b8ef49c765494bbf984d7590d884393238ba4c59be"

[services.production.health.startup]
path = "/api/health"
timeout = 120

# Live preview（Executor Pod 内运行的 dev server）
[services.preview]
install = ["npm", "install"]
args = ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
port = 5173

[services.preview.health]
path = "/api/health"
timeout = 180

[services.preview.env]
NODE_ENV = "development"
HOST = "0.0.0.0"
BROWSER = "none"
VITE_ALLOWED_HOSTS = "all"
SESSION_SECRET = "preview-session-secret-0123456789abcdef"
PREVIEW_USER_ID = "preview-admin"
PREVIEW_USER_NAME = "Preview Admin"
PREVIEW_USER_EMAIL = "preview.admin@example.com"
PREVIEW_USER_ROLE = "admin"
