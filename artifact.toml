# MonoApp — UNSSWE 部署配置
#
# 本文件由 Build-Deploy 服务解析，决定如何构建、运行、健康检查。
# 优先级：App deploy_config (DB 覆写) > 本文件 > 平台硬编码默认值。
#
# 环境变量注入（自动）:
#   DATABASE_URL  — Backend 按 Project schema 自动注入到 build_env / run_env
#   PORT          — RuntimeManager 按 localPort 自动注入

[deployment]
deploymentTarget = "autoscale"

[[services]]
name = "web"
paths = ["/"]
localPort = 5173

[services.production]
serve = "dynamic"

[services.production.build]
args = [
  "npm", "install", "&&",
  "npm", "run", "build",
]
outputDir = "dist"

[services.production.run]
args = ["node", "server.mjs"]
image = "node:20-alpine"

[services.production.run.env]
NODE_ENV = "production"
HOSTNAME = "0.0.0.0"

[services.production.health.startup]
path = "/api/health"
timeout = 120

# Live preview（Executor Pod 内运行的 dev server）
[services.preview]
install = ["npm", "install"]
args = ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
port = 5173

[services.preview.health]
path = "/api/health"
timeout = 180

[services.preview.env]
NODE_ENV = "development"
HOSTNAME = "0.0.0.0"
BROWSER = "none"
VITE_ALLOWED_HOSTS = "all"
SESSION_SECRET = "preview-session-secret-0123456789abcdef"
PREVIEW_USER_ID = "preview-operator"
PREVIEW_USER_NAME = "Preview Operator"
PREVIEW_USER_EMAIL = "preview.operator@example.com"
PREVIEW_USER_ROLE = "operator"
