# MonoApp - UNSSWE deployment configuration
#
# This file is parsed by the Build-Deploy service to determine build, runtime,
# and health-check behavior.
# Priority: app deploy_config (DB overrides) > this file > platform hardcoded defaults.
#
# Environment injection (automatic):
#   DATABASE_URL  - injected into build_env / run_env by the backend per project schema
#   PORT          - injected by RuntimeManager from localPort

[deployment]
deploymentTarget = "autoscale"

[[services]]
name = "web"
paths = ["/"]
localPort = 5173

[services.production]
serve = "dynamic"

[services.production.build]
args = [
  "rm", "-rf", "runtime", "&&",
  "npm", "ci", "&&",
  "npm", "run", "build", "&&",
  "rm", "-rf", "node_modules", "&&",
  "npm", "ci", "--omit=dev", "--ignore-scripts", "--no-audit", "--no-fund", "&&",
  "mkdir", "-p", "runtime", "&&",
  "cp", "-R", "dist", "server.mjs", "package.json", "package-lock.json", "node_modules", "runtime/",
]
outputDir = "runtime"

[services.production.run]
args = ["node", "server.mjs"]
image = "node:22-alpine"

[services.production.run.env]
NODE_ENV = "production"
HOST = "0.0.0.0"
SESSION_SECRET = "fff03854d9eee4fca8fb13b8ef49c765494bbf984d7590d884393238ba4c59be"

[services.production.health.startup]
path = "/api/health"
timeout = 120

# Live preview (dev server running inside the Executor Pod)
[services.preview]
install = ["npm", "install"]
args = ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
port = 5173

[services.preview.env]
NODE_ENV = "development"
HOST = "0.0.0.0"
BROWSER = "none"
VITE_ALLOWED_HOSTS = "all"
SESSION_SECRET = "preview-session-secret-0123456789abcdef"
